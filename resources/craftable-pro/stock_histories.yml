                                    - item_id
                                    - document_id
                                    - initial_stock_quantity
                                    - initial_item_cost
                                    - is_stock_entry
                                    - quantity
                                    - current_stock_quantity
                                    - current_item_cost
                                    - description
                                    - comments
            translatable: {}
            publishable: none
            media_collections: {}
            relationships: {}
            api:
