craftable-pro:
    models:
        Holiday:
            table: holidays
            skip_model: false
            columns:
                id: id
                store_id: 'id foreign'
                name: string
                reason: 'string nullable'
                starts_at: datetime
                ends_at: 'datetime nullable'
                comments: 'string nullable'
                created_at: 'datetime nullable'
                updated_at: 'datetime nullable'
            listing:
                id: 'sortable searchable'
                store_id: 'sortable searchable'
                name: 'sortable searchable'
                reason: 'sortable searchable'
                starts_at: sortable
                ends_at: sortable
                comments: 'sortable searchable'
                created_at: sortable
            form:
                columns:
                    -
                        cards:
                            -
                                fields:
                                    - store_id
                                    - name
                                    - reason
                                    - starts_at
                                    - ends_at
                                    - comments
            translatable: {}
            publishable: none
            media_collections: {}
            relationships: {}
            api:
                index:
                    columns:
                        - id
                        - store_id
                        - name
                        - reason
                        - starts_at
                        - ends_at
                        - comments
                        - created_at
                        - updated_at
                store:
                    columns:
                        - store_id
                        - name
                        - reason
                        - starts_at
                        - ends_at
                        - comments
                update:
                    columns:
                        - store_id
                        - name
                        - reason
                        - starts_at
                        - ends_at
                        - comments
                show:
                    columns:
                        - id
                        - store_id
                        - name
                        - reason
                        - starts_at
                        - ends_at
                        - comments
                        - created_at
                        - updated_at
                destroy: {}
            features: {}
