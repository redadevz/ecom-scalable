craftable-pro:
    models:
        LoyaltyCard:
            table: loyalty_cards
            skip_model: false
            columns:
                id: id
                loyalty_card_type_id: 'id foreign'
                customer_id: 'id foreign nullable'
                code: string
                is_active: boolean
                created_at: 'datetime nullable'
                updated_at: 'datetime nullable'
            listing:
                id: 'sortable searchable'
                loyalty_card_type_id: 'sortable searchable'
                customer_id: 'sortable searchable'
                code: 'sortable searchable'
                is_active: 'sortable searchable'
                created_at: sortable
            form:
                columns:
                    -
                        cards:
                            -
                                fields:
                                    - loyalty_card_type_id
                                    - customer_id
                                    - code
                                    - is_active
            translatable: {}
            publishable: none
            media_collections: {}
            relationships: {}
            api:
                index:
                    columns:
                        - id
                        - loyalty_card_type_id
                        - customer_id
                        - code
                        - is_active
                        - created_at
                        - updated_at
                store:
                    columns:
                        - loyalty_card_type_id
                        - customer_id
                        - code
                        - is_active
                update:
                    columns:
                        - loyalty_card_type_id
                        - customer_id
                        - code
                        - is_active
                show:
                    columns:
                        - id
                        - loyalty_card_type_id
                        - customer_id
                        - code
                        - is_active
                        - created_at
                        - updated_at
                destroy: {}
            features: {}
