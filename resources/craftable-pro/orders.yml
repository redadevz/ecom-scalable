craftable-pro:
    models:
        Order:
            table: orders
            skip_model: false
            columns:
                id: id
                user_id: 'id foreign'
                status: string
                total: decimal
                created_at: 'datetime nullable'
                updated_at: 'datetime nullable'
            listing:
                id: 'sortable searchable'
                user_id: 'sortable searchable'
                status: 'sortable searchable'
                total: 'sortable searchable'
                created_at: sortable
            form:
                columns:
                    -
                        cards:
                            -
                                fields:
                                    - user_id
                                    - status
                                    - total
            translatable: {}
            publishable: null
            media_collections: {}
            relationships: {}
            api: {}
            features:
                - export
