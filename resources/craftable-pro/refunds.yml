craftable-pro:
    models:
        Refund:
            table: refunds
            skip_model: false
            columns:
                id: id
                sale_return_id: 'id foreign'
                payment_method_id: 'id foreign'
                refund_no: 'string nullable'
                amount: decimal
                cash_paid: 'decimal nullable'
                cash_change: 'decimal nullable'
                refund_time: 'datetime nullable'
                comments: 'string nullable'
                created_at: 'datetime nullable'
                updated_at: 'datetime nullable'
            listing:
                id: 'sortable searchable'
                sale_return_id: 'sortable searchable'
                payment_method_id: 'sortable searchable'
                refund_no: 'sortable searchable'
                amount: 'sortable searchable'
                cash_paid: 'sortable searchable'
                cash_change: 'sortable searchable'
                refund_time: sortable
                comments: 'sortable searchable'
                created_at: sortable
            form:
                columns:
                    -
                        cards:
                            -
                                fields:
                                    - sale_return_id
                                    - payment_method_id
                                    - refund_no
                                    - amount
                                    - cash_paid
                                    - cash_change
                                    - refund_time
                                    - comments
            translatable: {}
            publishable: none
            media_collections: {}
            relationships: {}
            api:
                index:
                    columns:
                        - id
                        - sale_return_id
                        - payment_method_id
                        - refund_no
                        - amount
                        - cash_paid
                        - cash_change
                        - refund_time
                        - comments
                        - created_at
                        - updated_at
                store:
                    columns:
                        - sale_return_id
                        - payment_method_id
                        - refund_no
                        - amount
                        - cash_paid
                        - cash_change
                        - refund_time
                        - comments
                update:
                    columns:
                        - sale_return_id
                        - payment_method_id
                        - refund_no
                        - amount
                        - cash_paid
                        - cash_change
                        - refund_time
                        - comments
                show:
                    columns:
                        - id
                        - sale_return_id
                        - payment_method_id
                        - refund_no
                        - amount
                        - cash_paid
                        - cash_change
                        - refund_time
                        - comments
                        - created_at
                        - updated_at
                destroy: {}
            features: {}
