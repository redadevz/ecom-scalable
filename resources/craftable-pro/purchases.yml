craftable-pro:
    models:
        Purchase:
            table: purchases
            skip_model: false
            columns:
                id: id
                store_id: 'id foreign'
                supplier_id: 'id foreign'
                entry_stock_time: 'datetime nullable'
                description: 'string nullable'
                is_paid: boolean
                comments: 'string nullable'
                created_at: 'datetime nullable'
                updated_at: 'datetime nullable'
            listing:
                id: 'sortable searchable'
                store_id: 'sortable searchable'
                supplier_id: 'sortable searchable'
                entry_stock_time: sortable
                description: 'sortable searchable'
                is_paid: 'sortable searchable'
                comments: 'sortable searchable'
                created_at: sortable
            form:
                columns:
                    -
                        cards:
                            -
                                fields:
                                    - store_id
                                    - supplier_id
                                    - entry_stock_time
                                    - description
                                    - is_paid
                                    - comments
            translatable: {}
            publishable: none
            media_collections: {}
            relationships: {}
            api:
                index:
                    columns:
                        - id
                        - store_id
                        - supplier_id
                        - entry_stock_time
                        - description
                        - is_paid
                        - comments
                        - created_at
                        - updated_at
                store:
                    columns:
                        - store_id
                        - supplier_id
                        - entry_stock_time
                        - description
                        - is_paid
                        - comments
                update:
                    columns:
                        - store_id
                        - supplier_id
                        - entry_stock_time
                        - description
                        - is_paid
                        - comments
                show:
                    columns:
                        - id
                        - store_id
                        - supplier_id
                        - entry_stock_time
                        - description
                        - is_paid
                        - comments
                        - created_at
                        - updated_at
                destroy: {}
            features: {}
